name: Deploy to itch.io

# Uploads dist/ to itch.io via butler on every push to main.
# Also triggerable manually from the Actions tab.
#
# Required secret:
#   BUTLER_API_KEY — get it at https://itch.io/user/settings/api-keys
#
# Optional repo variables:
#   ITCH_GAME    — itch target owner/slug (default: thenanox/theharness)
#   ITCH_CHANNEL — butler channel (default: html5)
# Create the page at https://itch.io/game/new before the first deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # VITE_BASE defaults to './' — correct for itch.io iframe

      - name: Install Butler
        run: |
          curl -fsSL --retry 3 -L -o butler.zip \
            "https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default"
          unzip -o butler.zip -d butler-bin
          BUTLER_BIN=$(find butler-bin -type f -name butler | head -n 1)
          chmod +x "$BUTLER_BIN"
          export PATH="$PWD/$(dirname "$BUTLER_BIN"):$PATH"
          echo "$PWD/$(dirname "$BUTLER_BIN")" >> "$GITHUB_PATH"
          butler version

      - name: Upload to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          ITCH_GAME: ${{ vars.ITCH_GAME || 'thenanox/theharness' }}
          ITCH_CHANNEL: ${{ vars.ITCH_CHANNEL || 'html5' }}
        run: |
          if [ -z "$BUTLER_API_KEY" ]; then
            echo "::error::Missing BUTLER_API_KEY secret."
            exit 1
          fi

          if [ -z "$ITCH_GAME" ] || [ -z "$ITCH_CHANNEL" ]; then
            echo "::error::Missing itch target configuration (ITCH_GAME/ITCH_CHANNEL)."
            exit 1
          fi

          if ! echo "$ITCH_GAME" | grep -Eq '^[^/]+/[^/]+$'; then
            echo "::error::ITCH_GAME must be in owner/slug format (current: '$ITCH_GAME')."
            exit 1
          fi

          echo "Checking itch.io game target: $ITCH_GAME"
          if ! butler status "$ITCH_GAME"; then
            echo "::error::Unable to access itch.io game '$ITCH_GAME'."
            echo "::error::Confirm the game exists (https://itch.io/game/new), the slug matches, and the API key has access."
            exit 1
          fi

          echo "Uploading dist/ to $ITCH_GAME:$ITCH_CHANNEL"
          butler push dist/ "$ITCH_GAME:$ITCH_CHANNEL" --userversion "${{ github.sha }}"
