name: Deploy to itch.io

# Uploads dist/ to itch.io via butler on every push to main.
# Also triggerable manually from the Actions tab.
#
# Required secret:
#   BUTLER_API_KEY — get it at https://itch.io/user/settings/api-keys
#
# Game target: thenanox/the-harness  (channel: html5)
# Create the page at https://itch.io/game/new before the first deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # VITE_BASE defaults to './' — correct for itch.io iframe

      - name: Install Butler
        run: |
          for i in 1 2 3 4; do
            curl -fsSL --retry 3 -o butler.zip \
              "https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default" && break
            echo "Attempt $i failed, waiting $((i * 5))s..."
            sleep $((i * 5))
          done
          unzip -o butler.zip
          chmod +x butler

      - name: Upload to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: ./butler push dist/ thenanox/the-harness:html5 --userversion "${{ github.sha }}"
