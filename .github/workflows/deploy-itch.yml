name: Deploy to itch.io

# Uploads dist/ to itch.io via butler on every push to main.
# Also triggerable manually from the Actions tab.
#
# Required secret:
#   BUTLER_API_KEY — get it at https://itch.io/user/settings/api-keys
#
# Game target: thenanox/the-harness  (channel: html5)
# Create the page at https://itch.io/game/new before the first deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # VITE_BASE defaults to './' — correct for itch.io iframe

      - name: Install Butler
        run: |
          BUTLER_URL=$(curl -s "https://api.github.com/repos/itchio/butler/releases/latest" \
            | grep "browser_download_url.*linux-amd64" | cut -d'"' -f4)
          curl -fsSL --retry 3 -L -o butler.zip "$BUTLER_URL"
          unzip -o butler.zip -d butler-bin
          BUTLER_BIN=$(find butler-bin -type f -name butler | head -n 1)
          chmod +x "$BUTLER_BIN"
          echo "$PWD/$(dirname "$BUTLER_BIN")" >> "$GITHUB_PATH"
          butler -V

      - name: Upload to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: butler push dist/ thenanox/the-harness:html5 --userversion "${{ github.sha }}"
