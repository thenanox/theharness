name: Deploy to itch.io

# Uploads dist/ to itch.io via butler on every push to main.
# Also triggerable manually from the Actions tab.
#
# Required secret:
#   BUTLER_API_KEY — get it at https://itch.io/user/settings/api-keys
#
# Game target: thenanox/the-harness  (channel: html5)
# Create the page at https://itch.io/game/new before the first deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # VITE_BASE defaults to './' — correct for itch.io iframe

      - name: Upload to itch.io
        uses: Ayowel/butler-to-itch@v1.0.0
        with:
          butler_key: ${{ secrets.BUTLER_API_KEY }}
          itch_user: thenanox
          itch_game: the-harness
          version: ${{ github.sha }}
          channel: html5
          package: dist/
