name: Deploy to Wavedash

# Builds and pushes dist/ to Wavedash on every push to main.
# Also triggerable manually from the Actions tab.
#
# Required secret:
#   WAVEDASH_API_KEY — your Wavedash API key (starts with wd_)
# Optional secret:
#   WAVEDASH_GAME_ID — overrides game_id in wavedash.toml (useful for forks/environments)
#
# Config is read from wavedash.toml (game_id + upload_dir).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # VITE_BASE defaults to './' — correct for Wavedash iframe

      - name: Install Wavedash CLI
        run: curl -fsSL https://wavedash.com/cli/install.sh | sh

      - name: Validate Wavedash settings
        env:
          WAVEDASH_TOKEN: ${{ secrets.WAVEDASH_TOKEN || secrets.WAVEDASH_API_KEY }}
          WAVEDASH_GAME_ID: ${{ secrets.WAVEDASH_GAME_ID }}
        run: |
          if [ -z "$WAVEDASH_TOKEN" ]; then
            echo "::error::Missing WAVEDASH_TOKEN (or WAVEDASH_API_KEY) secret."
            exit 1
          fi

          if [ -n "$WAVEDASH_GAME_ID" ]; then
            sed -i "s/^game_id = .*/game_id = \"$WAVEDASH_GAME_ID\"/" wavedash.toml
          fi

          echo "Using wavedash.toml target:"
          cat wavedash.toml

      - name: Authenticate Wavedash CLI
        env:
          WAVEDASH_TOKEN: ${{ secrets.WAVEDASH_TOKEN || secrets.WAVEDASH_API_KEY }}
        run: |
          wavedash auth login --token "$WAVEDASH_TOKEN"
          wavedash auth status

      - name: Deploy to Wavedash
        run: wavedash build push
        env:
          WAVEDASH_TOKEN: ${{ secrets.WAVEDASH_TOKEN || secrets.WAVEDASH_API_KEY }}
