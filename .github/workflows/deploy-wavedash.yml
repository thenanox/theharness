name: Deploy to Wavedash

# Builds and pushes dist/ to Wavedash on every push to main.
# Also triggerable manually from the Actions tab.
#
# Required secret:
#   WAVEDASH_TOKEN — your Wavedash API key (starts with wd_)
#
# Config is read from wavedash.toml (game_id + upload_dir).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # VITE_BASE defaults to './' — correct for Wavedash iframe

      - name: Install Wavedash CLI
        run: curl -fsSL https://wavedash.com/cli/install.sh | sh

      - name: Validate Wavedash settings
        env:
          WAVEDASH_TOKEN: ${{ secrets.WAVEDASH_TOKEN }}
        run: |
          if [ -z "$WAVEDASH_TOKEN" ]; then
            echo "::error::Missing WAVEDASH_TOKEN secret."
            exit 1
          fi

          if [ ! -f wavedash.toml ]; then
            echo "::error::Missing wavedash.toml in repository root."
            exit 1
          fi

          echo "Using wavedash.toml target:"
          cat wavedash.toml

      - name: Check Wavedash auth
        env:
          WAVEDASH_TOKEN: ${{ secrets.WAVEDASH_TOKEN }}
        run: wavedash auth status

      - name: Deploy to Wavedash
        run: wavedash build push
        env:
          WAVEDASH_TOKEN: ${{ secrets.WAVEDASH_TOKEN }}
