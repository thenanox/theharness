name: Deploy to Wavedash

# Builds and pushes dist/ to Wavedash on every push to main.
# Also triggerable manually from the Actions tab.
#
# Required secret:
#   WAVEDASH_TOKEN or WAVEDASH_API_KEY — your Wavedash API key (starts with wd_)
#
# Config is read from wavedash.toml (game_id + upload_dir + entrypoint).
# The Wavedash CLI uploads an immutable build. Publishing/promoting that build
# is currently done from the Wavedash Developer Portal.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # VITE_BASE defaults to './' — correct for Wavedash iframe

      - name: Install Wavedash CLI
        run: |
          curl -fsSL https://wavedash.com/cli/install.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/wavedash" --version

      - name: Validate Wavedash settings
        env:
          WAVEDASH_TOKEN: ${{ secrets.WAVEDASH_TOKEN || secrets.WAVEDASH_API_KEY }}
        run: |
          if [ -z "$WAVEDASH_TOKEN" ]; then
            echo "::error::Missing WAVEDASH token secret. Set WAVEDASH_TOKEN or WAVEDASH_API_KEY."
            exit 1
          fi

          if [ ! -f wavedash.toml ]; then
            echo "::error::Missing wavedash.toml in repository root."
            exit 1
          fi

          GAME_ID=$(sed -nE 's/^game_id\s*=\s*"([^"]+)".*/\1/p' wavedash.toml | head -n 1)
          UPLOAD_DIR=$(sed -nE 's/^upload_dir\s*=\s*"([^"]+)".*/\1/p' wavedash.toml | head -n 1)
          ENTRYPOINT=$(sed -nE 's/^entrypoint\s*=\s*"([^"]+)".*/\1/p' wavedash.toml | head -n 1)

          if [ -z "$GAME_ID" ]; then
            echo "::error::Missing game_id in wavedash.toml."
            exit 1
          fi

          if [ -z "$UPLOAD_DIR" ]; then
            echo "::error::Missing upload_dir in wavedash.toml."
            exit 1
          fi

          if [ ! -d "$UPLOAD_DIR" ]; then
            echo "::error::upload_dir '$UPLOAD_DIR' not found. Ensure the build step generated it."
            exit 1
          fi

          if [ -n "$ENTRYPOINT" ] && [ ! -f "$UPLOAD_DIR/$ENTRYPOINT" ]; then
            echo "::error::entrypoint '$ENTRYPOINT' not found inside upload_dir '$UPLOAD_DIR'."
            exit 1
          fi

          echo "Configured Wavedash game_id: $GAME_ID"
          echo "Configured Wavedash upload_dir: $UPLOAD_DIR"
          if [ -n "$ENTRYPOINT" ]; then
            echo "Configured Wavedash entrypoint: $ENTRYPOINT"
          fi
          echo "::notice::If 'wavedash build push' fails while creating the build, confirm this game_id exists in the Wavedash Developer Portal (create the game first, then copy the exact ID)."

          echo "Using wavedash.toml target:"
          cat wavedash.toml

      - name: Check Wavedash auth
        env:
          WAVEDASH_TOKEN: ${{ secrets.WAVEDASH_TOKEN || secrets.WAVEDASH_API_KEY }}
        run: wavedash auth status

      - name: Deploy to Wavedash
        run: wavedash build push --message "GitHub Actions deploy ${{ github.sha }}"
        env:
          WAVEDASH_TOKEN: ${{ secrets.WAVEDASH_TOKEN || secrets.WAVEDASH_API_KEY }}
